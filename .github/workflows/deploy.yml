name: Deploy

on:
  push:
    branches:
      - master

permissions:
  id-token: write # required for OIDC authentication
  contents: read

jobs:
  deploy:
    name: Build and deploy Lambda functions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Go binaries
        run: make build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::813924112385:role/GitHubAssumeRole
          aws-region: us-east-1

      - name: Read deploy config from SSM
        run: |
          BUCKET=$(aws ssm get-parameter \
            --name /rudolph/deploy/lambda-code-bucket \
            --query Parameter.Value --output text)
          FUNCTIONS=$(aws ssm get-parameter \
            --name /rudolph/deploy/endpoint-functions \
            --query Parameter.Value --output text)
          AUTHORIZER=$(aws ssm get-parameter \
            --name /rudolph/deploy/authorizer-function \
            --query Parameter.Value --output text)
          REGION=$(aws ssm get-parameter \
            --name /rudolph/deploy/region \
            --query Parameter.Value --output text)
          echo "BUCKET=$BUCKET" >> "$GITHUB_ENV"
          echo "FUNCTIONS=$FUNCTIONS" >> "$GITHUB_ENV"
          echo "AUTHORIZER=$AUTHORIZER" >> "$GITHUB_ENV"
          echo "REGION=$REGION" >> "$GITHUB_ENV"

      - name: Upload binaries to S3
        run: |
          aws s3 cp build/package/api_deployment.zip \
            "s3://$BUCKET/api_deployment.zip"
          aws s3 cp build/package/api_authorizer_deployment.zip \
            "s3://$BUCKET/api_authorizer_deployment.zip"

      - name: Update Lambda functions
        run: |
          IFS=',' read -ra FNS <<< "$FUNCTIONS"
          for fn in "${FNS[@]}"; do
            aws lambda update-function-code \
              --region "$REGION" \
              --function-name "$fn" \
              --s3-bucket "$BUCKET" \
              --s3-key api_deployment.zip \
              --no-cli-pager
          done
          aws lambda update-function-code \
            --region "$REGION" \
            --function-name "$AUTHORIZER" \
            --s3-bucket "$BUCKET" \
            --s3-key api_authorizer_deployment.zip \
            --no-cli-pager
